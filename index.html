<!doctype html>
<html lang="en">
  <head>
    <!--
      Theme anti-FOUC IIFE: applies dark/light class before React hydrates.
      Intentionally duplicates useTheme.ts logic — this is the "first paint" guard,
      the hook syncs React state with the pre-applied class afterward.

      WARNING: This inline script's content is PINNED by a sha256 hash in the
      `script-src` directive of nginx.conf (both CSP blocks). Changing even a single
      character of this script requires regenerating the hash and updating BOTH CSP
      blocks in nginx.conf, or the browser will block this script (theme FOUC).
      Regenerate with:
        printf '%s' "<script content bytes>" | openssl dgst -sha256 -binary | openssl base64
    -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('theme-preference');
          var theme = stored;
          if (!theme || !['light', 'dark', 'system'].includes(theme)) {
            theme = globalThis.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'system') {
            theme = globalThis.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.add(theme);
        } catch (e) {
          // localStorage unavailable (rare privacy mode) — graceful fallback
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Miguel Ángel de Dios — Full-Stack Developer & Software Engineer. React, TypeScript, and modern web experiences."
    />
    <title>Miguel Ángel de Dios — Full-Stack Developer & Software Engineer</title>
    <link rel="preload" href="/fonts/Inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Resource hints for faster external connections -->
    <link rel="preconnect" href="https://formspree.io" crossorigin />
    <link rel="preconnect" href="https://mywebsite-umami.mddiosc.cloud" crossorigin />
    <!-- Umami Analytics -->
    <script defer src="https://mywebsite-umami.mddiosc.cloud/script.js" data-website-id="%VITE_UMAMI_WEBSITE_ID%"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
